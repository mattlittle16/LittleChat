name: CI

on:
  pull_request:
    branches: [master]

jobs:
  commitlint:
    runs-on: ubuntu-latest
    if: github.actor != 'release-please[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: src/frontend/commitlint.config.mjs

  backend-ci:
    needs: [commitlint]
    if: github.actor != 'release-please[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore MattLab.Chat.slnx

      - name: Build
        run: dotnet build MattLab.Chat.slnx --no-restore -c Release

      - name: Architecture tests
        run: dotnet test tests/Architecture/ --no-build -c Release

      - name: Unit tests
        run: dotnet test tests/Unit/ --no-build -c Release

  frontend-ci:
    needs: [commitlint]
    if: github.actor != 'release-please[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  ci-gate:
    runs-on: ubuntu-latest
    needs: [commitlint, backend-ci, frontend-ci]
    if: always()
    steps:
      - name: Pass if all CI jobs succeeded or were skipped
        run: |
          if [[ "${{ needs.commitlint.result }}"  == "failure" ]] || \
             [[ "${{ needs.backend-ci.result }}"  == "failure" ]] || \
             [[ "${{ needs.frontend-ci.result }}" == "failure" ]]; then
            exit 1
          fi

name: CI / Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore MattLab.Chat.slnx

      - name: Build
        run: dotnet build MattLab.Chat.slnx --no-restore -c Release

      - name: Architecture tests
        run: dotnet test tests/Architecture/ --no-build -c Release

      - name: Unit tests
        run: dotnet test tests/Unit/ --no-build -c Release

  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  deploy:
    needs: [backend-ci, frontend-ci]
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create env file
        run: |
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "POSTGRES_CONNECTION_STRING=${{ secrets.POSTGRES_CONNECTION_STRING }}" >> .env
          echo "VALKEY_CONNECTION_STRING=${{ secrets.VALKEY_CONNECTION_STRING }}" >> .env
          echo "AUTHENTIK_AUTHORITY=${{ secrets.AUTHENTIK_AUTHORITY }}" >> .env
          echo "AUTHENTIK_CLIENT_ID=${{ secrets.AUTHENTIK_CLIENT_ID }}" >> .env
          echo "AUTHENTIK_CLIENT_SECRET=${{ secrets.AUTHENTIK_CLIENT_SECRET }}" >> .env
          echo "UPLOAD_PATH=${{ secrets.UPLOAD_PATH }}" >> .env
          echo "CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}" >> .env
          echo "MESSAGE_PAGE_SIZE=${{ secrets.MESSAGE_PAGE_SIZE }}" >> .env

      - name: Build images
        run: docker compose -f docker-compose.prod.yml build

      - name: Deploy services
        run: docker compose -f docker-compose.prod.yml up -d

      - name: Verify deployment
        run: |
          sleep 15
          docker compose -f docker-compose.prod.yml ps | grep "chat-backend" | grep -E "Up|running" || exit 1
          docker compose -f docker-compose.prod.yml ps | grep "nginx" | grep -E "Up|running" || exit 1

      - name: Clean up old images
        run: docker image prune -f

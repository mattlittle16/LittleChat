name: CI / Deploy

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: src/frontend/commitlint.config.mjs

  backend-ci:
    needs: [commitlint]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore MattLab.Chat.slnx

      - name: Build
        run: dotnet build MattLab.Chat.slnx --no-restore -c Release

      - name: Architecture tests
        run: dotnet test tests/Architecture/ --no-build -c Release

      - name: Unit tests
        run: dotnet test tests/Unit/ --no-build -c Release

  frontend-ci:
    needs: [commitlint]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  publish:
    needs: [backend-ci, frontend-ci]
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          file: src/backend/Dockerfile
          target: final
          push: true
          tags: |
            mituw16/littlechat:backend-latest
            mituw16/littlechat:backend-${{ github.sha }}

      - name: Inject HEADSCRIPTS
        env:
          HEADSCRIPTS: ${{ vars.HEADSCRIPTS }}
        run: |
          python3 -c "
          import os
          path = 'src/frontend/index.html'
          content = open(path).read()
          content = content.replace('<!-- HEADSCRIPTS -->', os.environ.get('HEADSCRIPTS', ''))
          open(path, 'w').write(content)
          "

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: src/frontend
          file: src/frontend/Dockerfile
          target: final
          push: true
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          tags: |
            mituw16/littlechat:frontend-latest
            mituw16/littlechat:frontend-${{ github.sha }}

  tag:
    needs: [publish]
    if: github.actor != 'release-please[bot]' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Bump version and push tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

  deploy:
    needs: [publish]
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create env file
        run: |
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "POSTGRES_CONNECTION_STRING=${{ secrets.POSTGRES_CONNECTION_STRING }}" >> .env
          echo "VALKEY_CONNECTION_STRING=${{ secrets.VALKEY_CONNECTION_STRING }}" >> .env
          echo "OIDC_AUTHORITY=${{ secrets.AUTHENTIK_AUTHORITY }}" >> .env
          echo "OIDC_CLIENT_ID=${{ secrets.AUTHENTIK_CLIENT_ID }}" >> .env
          echo "OIDC_CLIENT_SECRET=${{ secrets.AUTHENTIK_CLIENT_SECRET }}" >> .env
          echo "OIDC_SKIP_RESPONSE_VALIDATION=true" >> .env
          echo "UPLOAD_PATH=${{ secrets.UPLOAD_PATH }}" >> .env
          echo "CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}" >> .env
          echo "MESSAGE_PAGE_SIZE=${{ secrets.MESSAGE_PAGE_SIZE }}" >> .env
          echo "POSTGRES_DATA_PATH=${{ secrets.POSTGRES_DATA_PATH }}" >> .env
          echo "KLIPY_API_KEY=${{ secrets.KLIPY_API_KEY }}" >> .env

      - name: Pull latest images
        run: docker compose -f docker-compose.prod.yml pull

      - name: Deploy services
        run: docker compose -f docker-compose.prod.yml up -d --force-recreate

      - name: Verify deployment
        run: |
          sleep 30
          docker compose -f docker-compose.prod.yml ps
          docker compose -f docker-compose.prod.yml ps | grep -E "chat-backend" | grep -Eiv "exit|stop|dead" || exit 1
          docker compose -f docker-compose.prod.yml ps | grep -E "nginx" | grep -Eiv "exit|stop|dead" || exit 1

      - name: Clean up old images
        run: docker image prune -f

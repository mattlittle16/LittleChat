services:
  chat-backend:
    image: mituw16/littlechat:backend-latest
    expose:
      - "5000"
    volumes:
      - ${UPLOAD_PATH}:/uploads
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - OIDC_AUTHORITY=${OIDC_AUTHORITY}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - OIDC_SKIP_RESPONSE_VALIDATION=${OIDC_SKIP_RESPONSE_VALIDATION:-true}
      - POSTGRES_CONNECTION_STRING=${POSTGRES_CONNECTION_STRING}
      - VALKEY_CONNECTION_STRING=${VALKEY_CONNECTION_STRING}
      - UPLOAD_PATH=/uploads
      - MESSAGE_PAGE_SIZE=${MESSAGE_PAGE_SIZE:-100}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - KLIPY_API_KEY=${KLIPY_API_KEY}
    depends_on:
      chat-db:
        condition: service_healthy
      valkey:
        condition: service_started
    restart: unless-stopped
    networks:
      - internal

  chat-db:
    image: postgres:16-alpine
    volumes:
      - ${POSTGRES_DATA_PATH}:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-littlechat}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-littlechat}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - internal

  valkey:
    image: valkey/valkey:latest
    restart: unless-stopped
    networks:
      - internal

  chat-frontend:
    image: mituw16/littlechat:frontend-latest
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: littlechat-nginx
    expose:
      - "80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - chat-backend
      - chat-frontend
    restart: unless-stopped
    networks:
      - app-network
      - internal

networks:
  internal:
    driver: bridge
  app-network:
    external: true
